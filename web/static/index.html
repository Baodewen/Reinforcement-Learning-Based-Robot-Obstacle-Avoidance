<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV Simulation Control Panel</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">EV Simulation</p>
        <h1>训练、地图、模型一体化控制台</h1>
        <p class="subhead">面向强化学习小车的训练面板、模型管理、在线地图编辑与固定地图演示。</p>
      </div>
      <div class="hero-meta card">
        <div><span>CUDA</span><strong id="cudaStatus">检测中</strong></div>
        <div><span>模型目录</span><strong id="modelDir">-</strong></div>
        <div><span>地图目录</span><strong id="mapDir">-</strong></div>
      </div>
    </header>

    <main class="grid">
      <section class="card panel accent-train">
        <div class="panel-head">
          <h2>训练控制</h2>
          <button id="startTrainBtn" class="button primary">开始训练</button>
        </div>
        <div class="form-grid">
          <label>训练步数<input id="timesteps" type="number" value="10000" min="1"></label>
          <label>随机种子<input id="seed" type="number" value="0"></label>
          <label>地图尺寸<input id="mapSize" type="number" value="64" min="16" max="128"></label>
          <label>障碍密度<input id="obstacleDensity" type="number" value="0.15" min="0.01" max="0.45" step="0.01"></label>
          <label>LiDAR 数量<input id="lidarRays" type="number" value="24" min="8" max="128"></label>
          <label>最大步数<input id="maxSteps" type="number" value="300" min="50" max="2000"></label>
          <label>设备选择
            <select id="device">
              <option value="auto">Auto</option>
              <option value="gpu">GPU</option>
              <option value="cpu">CPU</option>
            </select>
          </label>
        </div>
      </section>

      <section class="card panel accent-status">
        <div class="panel-head">
          <h2>训练监控</h2>
          <span class="badge" id="trainStatus">idle</span>
        </div>
        <div class="stats-grid">
          <div class="stat"><span>设备</span><strong id="deviceResolved">-</strong></div>
          <div class="stat"><span>总步数</span><strong id="totalTimesteps">0</strong></div>
          <div class="stat"><span>开始时间</span><strong id="startedAt">-</strong></div>
          <div class="stat"><span>结束时间</span><strong id="finishedAt">-</strong></div>
        </div>
        <div class="paths">
          <p>最新模型：<code id="latestModelPath">-</code></p>
          <p>最佳模型：<code id="bestModelPath">-</code></p>
        </div>
        <pre id="trainLogs" class="log-box">等待训练日志...</pre>
      </section>

      <section class="card panel accent-model">
        <div class="panel-head">
          <h2>模型管理与演示</h2>
          <button id="launchDemoBtn" class="button secondary">启动演示</button>
        </div>
        <div class="model-list" id="modelList"></div>
        <div class="form-grid compact">
          <label>模型路径<input id="demoModelPath" type="text" value="models\best_model.zip"></label>
          <label>地图来源
            <select id="demoMapMode">
              <option value="random">随机地图</option>
              <option value="saved">已保存地图</option>
            </select>
          </label>
          <label>地图文件
            <select id="demoMapPath"></select>
          </label>
          <label>演示种子<input id="demoSeed" type="number" value="0"></label>
          <label>FPS<input id="demoFps" type="number" value="20" min="1" max="120"></label>
          <label>最大局数<input id="demoEpisodes" type="number" value="0" min="0"></label>
        </div>
        <pre id="demoCommand" class="log-box small">等待演示命令...</pre>
      </section>

      <section class="card panel editor accent-map">
        <div class="panel-head">
          <h2>在线地图编辑</h2>
          <div class="toolbar">
            <button class="tool active" data-tool="wall">障碍</button>
            <button class="tool" data-tool="erase">橡皮擦</button>
            <button class="tool" data-tool="start">起点</button>
            <button class="tool" data-tool="goal">终点</button>
            <button id="clearMapBtn" class="button ghost">清空</button>
          </div>
        </div>
        <div class="editor-layout">
          <canvas id="mapCanvas" width="640" height="640"></canvas>
          <div class="editor-side">
            <label>地图名称<input id="mapName" type="text" value="custom_map"></label>
            <label>保存地图
              <select id="savedMaps"></select>
            </label>
            <div class="action-row">
              <button id="saveMapBtn" class="button primary">保存地图</button>
              <button id="loadMapBtn" class="button secondary">读取地图</button>
            </div>
            <p class="helper">首版使用栅格画笔。保存时会校验起点、终点和可达性。</p>
            <pre id="mapStatus" class="log-box small">等待地图操作...</pre>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
